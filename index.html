  // ═══════════════ ESCALIER (droit bois) ═══════════════
  'escalier': {
    label: 'Escalier',
    icon: '<path d="M3 20h4v-4h4v-4h4v-4h4V4" fill="none"/><path d="M3 20h4v-4h4v-4h4v-4h4"/>',
    dtu: { ref: 'Calcul de Blondel', text: 'Dimensionnement GÉOMÉTRIQUE d\'un escalier droit selon la loi de Blondel (2h + g ≈ 63 cm) — ce calcul est fiable et déterministe. ⚠️ En revanche, la <strong>section des limons et la fixation/structure</strong> (escalier autoportant, grande portée, ancrages muraux) doivent être validées au cas par cas. Garde-corps : hauteur ≥ 1 m, vides ≤ 11 cm (sécurité enfants).' },
    systemes: [
      { id: 'droit-bois', nom: 'Escalier droit en bois', desc: 'Calcul Blondel automatique (nombre de marches, hauteur, giron, pente, reculement) + métré bois : marches, contremarches, limons, garde-corps.' },
    ],
    dims: () => [
      { type:'num', id:'hauteur', label:'Hauteur à monter (sol fini → sol fini étage)', unit:'M' },
      { type:'num', id:'largeur', label:'Largeur d\'emmarchement (passage)', unit:'M' },
      { type:'select', id:'hcible', label:'Confort visé (hauteur de marche)', options: [
        {val:'17', label:'Confortable (~17 cm) — recommandé'},
        {val:'18', label:'Standard (~18 cm)'},
        {val:'19.5', label:'Compact / gain de place (~19,5 cm)'},
      ]},
    ],
    options: () => [
      { id:'contremarches', label:'Escalier fermé (avec contremarches)', sub:'Sinon escalier ouvert (marches seules)', def:true },
      { id:'garde-corps', label:'Garde-corps / rampe', sub:'1 côté — main courante + balustres', def:true },
    ],
    calc: (D, sys, opts) => {
      const HM = D.hauteur * 100; // cm
      const le = D.largeur; // m (emmarchement)
      const hCible = parseFloat(D.hcible); // cm
      const mats = [];

      // ── Loi de Blondel ──
      const n = Math.max(2, Math.round(HM / hCible)); // nombre de hauteurs (contremarches)
      const h = HM / n; // hauteur réelle de marche (cm)
      const nbMarches = n - 1; // nombre de girons (marches débouchant sur le plancher)
      let g = 63 - 2 * h; // giron via pas cible 63 cm
      g = Math.max(21, Math.min(34, g)); // bornage physique
      const pas = 2 * h + g;
      const reculement = nbMarches * g; // cm (longueur projetée au sol)
      const penteDeg = Math.atan(h / g) * 180 / Math.PI;
      const longVolee = Math.sqrt(HM * HM + reculement * reculement); // cm (≈ longueur limon)

      // Statuts de confort
      const hOk = h >= 16 && h <= 18.5;
      const gOk = g >= 26 && g <= 32;
      const pasOk = pas >= 60 && pas <= 64;
      const penteOk = penteDeg >= 25 && penteDeg <= 38;

      // ── Résultats géométriques ──
      mats.push({ nom: 'NOMBRE DE MARCHES', qte: nbMarches, unite: `marches (${n} hauteurs)`,
        detail: `${nbMarches} girons + ${n} contremarches — la dernière hauteur débouche sur le plancher de l'étage`, coeff: '✓', dtu: '/' });
      mats.push({ nom: 'Hauteur de marche', qte: h.toFixed(1), unite: 'cm',
        detail: `${HM} cm ÷ ${n} hauteurs ${hOk ? '— ✓ confortable' : '— ⚠ hors confort (16–18,5 cm), ajuste la hauteur visée'}`, coeff: hOk ? '✓' : '⚠', dtu: '/' });
      mats.push({ nom: 'Giron (profondeur marche)', qte: g.toFixed(1), unite: 'cm',
        detail: `Calculé par Blondel ${gOk ? '— ✓ confortable (26–32 cm)' : '— ⚠ hors confort'}`, coeff: gOk ? '✓' : '⚠', dtu: '/' });
      mats.push({ nom: 'Pas (2h + g)', qte: pas.toFixed(1), unite: 'cm',
        detail: `Loi de Blondel : idéal 60–64 cm ${pasOk ? '— ✓ OK' : '— ⚠ à corriger'}`, coeff: pasOk ? '✓' : '⚠', dtu: '/' });
      mats.push({ nom: 'Pente de l\'escalier', qte: penteDeg.toFixed(1), unite: '°',
        detail: `${penteOk ? '✓ confortable (25–38°)' : penteDeg > 38 ? '⚠ raide (>38°)' : 'doux (<25°)'}`, coeff: penteOk ? '✓' : '⚠', dtu: '/' });
      mats.push({ nom: 'Reculement (longueur au sol)', qte: (reculement / 100).toFixed(2), unite: 'm',
        detail: `${nbMarches} girons × ${g.toFixed(1)} cm — encombrement horizontal nécessaire`, coeff: '≈', dtu: '/' });
      mats.push({ nom: 'Longueur de volée (limon)', qte: (longVolee / 100).toFixed(2), unite: 'm',
        detail: `Diagonale hauteur/reculement — longueur de chaque limon`, coeff: '≈', dtu: '/' });

      // ── Métré bois ──
      const gironMarche = (g + 3) / 100; // m (giron + recouvrement de nez ~3 cm)
      mats.push({ nom: 'Marches (hêtre/chêne lamellé)', qte: nbMarches, unite: 'marches',
        detail: `Dimension ${(g + 3).toFixed(0)}×${(le * 100).toFixed(0)} cm, ép. 36 mm`, coeff: '/', dtu: '/' });
      let volBois = nbMarches * gironMarche * le * 0.036;

      if (opts['contremarches']) {
        mats.push({ nom: 'Contremarches', qte: n, unite: 'pièces',
          detail: `Dimension ${h.toFixed(0)}×${(le * 100).toFixed(0)} cm, ép. 18 mm`, coeff: '/', dtu: '/' });
        volBois += n * (h / 100) * le * 0.018;
      }

      mats.push({ nom: 'Limons latéraux', qte: 2, unite: 'pièces',
        detail: `2 × ${(longVolee / 100).toFixed(2)} m — section conseillée 40×300 mm (à valider si grande portée)`, coeff: '⚠', dtu: '/' });
      volBois += 2 * (longVolee / 100) * 0.30 * 0.040;

      if (opts['garde-corps']) {
        const lgGc = longVolee / 100;
        const nbBal = Math.ceil(lgGc / 0.11); // balustres espacés ≤ 11 cm
        mats.push({ nom: 'Main courante', qte: (lgGc + 0.3).toFixed(2), unite: 'ml',
          detail: `Le long de la volée — hauteur ≥ 90 cm (1 m en palier)`, coeff: '/', dtu: '/' });
        mats.push({ nom: 'Balustres / barreaux', qte: nbBal, unite: 'barreaux',
          detail: `Espacement ≤ 11 cm (anti-passage tête enfant)`, coeff: '/', dtu: '/' });
      }

      mats.push({ nom: 'Quincaillerie (équerres, vis, colle)', qte: 1, unite: 'lot',
        detail: `Fixations marches/limons, vis bois, colle PU structurale`, coeff: '/', dtu: '/' });
      mats.push({ nom: 'Bois — volume indicatif total', qte: volBois.toFixed(3), unite: 'm³',
        detail: `Pour estimer un achat de bois brut/plateaux (info — déjà compté dans les éléments ci-dessus)`, coeff: 'i', dtu: '/' });

      return mats;
    },
    notes: () => [
      { dtu:true, text:'<strong>Loi de Blondel :</strong> 2×(hauteur de marche) + giron doit faire entre 60 et 64 cm (idéal 63). Hauteur de marche confortable 16–18 cm, giron 28–32 cm. C\'est la règle de l\'art pour un escalier confortable et sûr.' },
      { dtu:true, text:'<strong>Échappée :</strong> la hauteur libre de passage sous la trémie/plafond doit être ≥ 1,90 m (idéalement 2,00–2,10 m). Vérifie la dimension de ta trémie : c\'est souvent ce qui coince en rénovation.' },
      { dtu:true, text:'<strong>Garde-corps (sécurité) :</strong> hauteur ≥ 1 m (tolérée à 90 cm le long d\'une volée raide), vides verticaux ≤ 11 cm, pas d\'éléments horizontaux grimpables si enfants. Largeur de passage : 70 cm mini, 80–90 cm confortable.' },
      { dtu:false, text:'<strong>Structure :</strong> la section des limons (40×300 indicative) tient pour un escalier courant adossé à un mur. Pour un escalier autoportant, suspendu, ou de grande largeur, fais valider la section et les ancrages.' },
    ],
    viz: 'escalier'
  },
};

function matchPrice(nom) {
  const found = PRICE_DB.find(p => p.rx.test(nom));
  return found ? found.pu : 0;
}

let lastMats = [];
let lastPrices = [];

function recomputeTotal() {
  let total = 0;
  lastMats.forEach((m, i) => {
    const input = document.getElementById('pu-' + i);
    if (!input) return;
    const pu = parseFloat(input.value) || 0;
    lastPrices[i] = pu;
    const qte = parseFloat(m.qte) || 0;
    const sousTotal = pu * qte;
    total += sousTotal;
    const el = document.getElementById('total-' + i);
    if (el) el.textContent = sousTotal > 0 ? sousTotal.toFixed(0) + ' €' : '—';
  });
  const tEl = document.getElementById('grand-total');
  if (tEl) tEl.textContent = total.toFixed(0) + ' € HT';
  const tvaEl = document.getElementById('total-ttc');
  if (tvaEl) tvaEl.innerHTML = `TVA 20% : <strong>${(total*1.2).toFixed(0)} € TTC</strong> · TVA 10% (rénovation +2 ans) : <strong>${(total*1.1).toFixed(0)} € TTC</strong> — Prix matériaux indicatifs GSB/négoce, hors main d'œuvre et livraison. Modifiables ligne par ligne.`;
}

// ════════════════════════════════════════════════════════════
// CALCUL
// ════════════════════════════════════════════════════════════
function calculer() {
  const cfg = OUVRAGES[currentOuvrage];
  const dims = typeof cfg.dims === 'function' ? cfg.dims(currentSysteme) : cfg.dims;

  const D = {};
  let valid = true;
  dims.forEach(d => {
    D[d.id] = getDim(d.id);
    if (d.type === 'num' && (!D[d.id] || D[d.id] <= 0)) valid = false;
  });

  if (!valid) { alert('Veuillez renseigner toutes les dimensions.'); return; }

  const dim2 = D.hauteur !== undefined && D.hauteur !== null ? D.hauteur : D.largeur;
  const surfaceBrute = D.longueur * dim2;
  const dedSurface = deductions.reduce((a, d) => a + (d.larg * d.haut || 0), 0);
  D.surfaceNette = Math.max(0, surfaceBrute - dedSurface);

  const mats = cfg.calc(D, currentSysteme, optState);
  const notes = cfg.notes ? cfg.notes(currentSysteme, optState) : [];

  document.getElementById('surface-nette-header').innerHTML =
    `${D.surfaceNette.toFixed(2)} m² <small>nette</small>`;
  document.getElementById('results-title').textContent =
    cfg.label + ' — ' + cfg.systemes.find(s=>s.id===currentSysteme).nom;

  // bandeau conseil
  document.getElementById('dtu-banner-zone').innerHTML = `
    <div class="dtu-banner">
      <div class="dtu-tag">${cfg.dtu.ref}</div>
      <div class="dtu-text">${cfg.dtu.text}</div>
    </div>`;

  lastMats = mats;
  lastPrices = mats.map(m => matchPrice(m.nom));

  const grid = mats.map((m, i) => `
    <div class="mat-item">
      <div class="mat-coeff">${m.coeff}</div>
      <div class="mat-name">${m.nom}</div>
      <div class="mat-qty">${m.qte}<span class="mat-unit">${m.unite}</span></div>
      <div class="mat-detail">${m.detail}</div>
      <div class="mat-price-row">
        <input type="number" id="pu-${i}" value="${lastPrices[i] || ''}" step="0.01" min="0" oninput="recomputeTotal()" placeholder="0">
        <span class="mat-price-label">€/u HT</span>
        <span class="mat-price-total" id="total-${i}">—</span>
      </div>
    </div>
  `).join('');

  const notesHtml = notes.length ? `
    <div class="notes-section">
      ${notes.map(n => `
        <div class="note-item">
          <div class="note-dot ${n.dtu?'dtu':''}"></div>
          <span>${n.text}</span>
        </div>`).join('')}
    </div>` : '';

  document.getElementById('results-body').innerHTML = `
    <div class="materials-grid">${grid}</div>
    <div style="padding:0 18px 12px;font-size:0.7rem;color:var(--gris-mid)">
      Surface brute : <strong>${surfaceBrute.toFixed(2)} m²</strong>
      ${dedSurface > 0 ? ` — Déductions : <strong style="color:#C0392B">−${dedSurface.toFixed(2)} m²</strong>` : ''}
    </div>
    <div class="total-bar">
      <div class="total-label">Estimation matériaux</div>
      <div class="total-amount" id="grand-total">—</div>
      <div class="total-sub" id="total-ttc"></div>
    </div>
    <div class="share-row"><button class="share-btn primary" id="add-proj-btn" onclick="addCurrentToProject()">➕ Ajouter au projet</button><button class="share-btn" onclick="partagerMetre()">⤴ Partager</button></div>
    ${notesHtml}
  `;

  recomputeTotal();

  setTimeout(() => {
    document.querySelectorAll('.mat-item').forEach((el, i) => {
      setTimeout(() => el.classList.add('highlight'), i * 50);
    });
  }, 50);

  drawViz();
}

function clearResults() {
  document.getElementById('results-body').innerHTML = `
    <div class="empty-state"><div class="big">📐</div><p>Configurez l'ouvrage et calculez</p></div>`;
  document.getElementById('surface-nette-header').textContent = '—';
  document.getElementById('dtu-banner-zone').innerHTML = '';
  document.getElementById('results-title').textContent = 'Matériaux nécessaires';
}

function toast(msg) {
  let el = document.getElementById('toast');
  if (!el) { el = document.createElement('div'); el.id = 'toast'; el.className = 'toast'; document.body.appendChild(el); }
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2200);
}

function partagerMetre() {
  if (!lastMats || !lastMats.length) { toast('Lance d\'abord un calcul'); return; }
  const titre = document.getElementById('results-title').textContent;
  const surf = (document.getElementById('surface-nette-header').innerText || '').replace(/\s+/g, ' ').trim();
  let txt = `CALEPIN DE CHANTIER\n${titre}\nSurface : ${surf}\n\nMATÉRIAUX :\n`;
  lastMats.forEach(m => { txt += `• ${m.qte} ${m.unite} — ${m.nom}\n`; });
  const tot = document.getElementById('grand-total').textContent;
  if (tot && tot !== '—') txt += `\nEstimation matériaux : ${tot}`;
  txt += '\n\n(établi avec Calepin de Chantier)';
  if (navigator.share) {
    navigator.share({ title: 'Métré — ' + titre, text: txt }).catch(() => {});
  } else if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(() => toast('Métré copié ✓')).catch(() => toast('Copie impossible'));
  } else {
    toast('Partage non disponible sur cet appareil');
  }
}

function drawViz() {
  const type = OUVRAGES[currentOuvrage].viz;
  const canvas = document.getElementById('viz');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (type === 'doublage') drawDoublage(ctx, canvas);
  else if (type === 'cloison') drawCloison(ctx, canvas);
  else if (type === 'dalle') drawDalle(ctx, canvas);
  else if (type === 'plafond') drawPlafond(ctx, canvas);
  else if (type === 'structure') drawStructure(ctx, canvas);
  else if (type === 'plancher-bois') drawPlancherBois(ctx, canvas);
  else if (type === 'piece') drawPiece(ctx, canvas);
  else if (type === 'electricite') drawElec(ctx, canvas);
  else if (type === 'escalier') drawEscalier(ctx, canvas);
  else drawMur(ctx, canvas);

  updateVizTags();
}

function updateVizTags() {
  const L = getDim('longueur') || 0;
  const H = getDim('hauteur') ?? getDim('largeur') ?? 0;
  document.getElementById('vl').textContent = L > 0 ? L + ' m' : '—';
  document.getElementById('vh').textContent = H > 0 ? H + ' m' : '—';
  document.getElementById('vs').textContent = (L > 0 && H > 0) ? (L*H).toFixed(2)+' m²' : '—';
}

// ── Helpers schémas de coupe technique ──
function _hatch(ctx,x,y,w,h,color,gap){
  ctx.save();ctx.beginPath();ctx.rect(x,y,w,h);ctx.clip();
  ctx.strokeStyle=color;ctx.lineWidth=1;
  for(let i=-h;i<w+h;i+=gap){ctx.beginPath();ctx.moveTo(x+i,y+h);ctx.lineTo(x+i+h,y);ctx.stroke();}
  ctx.restore();
}
function _wool(ctx,x,y,w,h){
  ctx.fillStyle='#F2D98A';ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='rgba(120,90,20,0.18)';ctx.lineWidth=1;
  for(let yy=y+5;yy<y+h-1;yy+=7){
    ctx.beginPath();
    for(let xx=x;xx<=x+w;xx+=6){ctx.lineTo(xx,yy+Math.sin((xx-x)/5)*1.8);}
    ctx.stroke();
  }
}
function _plaque(ctx,x,y,w,h){
  ctx.fillStyle='#EDEAE4';ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='#C9C2B6';ctx.lineWidth=1;ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);
}
function _profilU(ctx,x,y,w,h){
  ctx.strokeStyle='#8A97A3';ctx.lineWidth=2;ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(x+w,y);ctx.lineTo(x,y);ctx.lineTo(x,y+h);ctx.lineTo(x+w,y+h);ctx.stroke();
}
function _legend(ctx,items,cx,y){
  ctx.save();ctx.font='600 9px Inter';ctx.textBaseline='middle';ctx.textAlign='left';
  const box=9,gap=5,pad=13;
  const ws=items.map(it=>box+gap+ctx.measureText(it.label).width+pad);
  const maxW=(ctx.canvas?ctx.canvas.width:360)-12;
  let lines=[[]],lw=[0];
  items.forEach((it,i)=>{if(lw[lines.length-1]+ws[i]>maxW&&lines[lines.length-1].length){lines.push([]);lw.push(0);}lines[lines.length-1].push({it,w:ws[i]});lw[lines.length-1]+=ws[i];});
  lines.forEach((line,li)=>{
    let total=line.reduce((a,p)=>a+p.w,0),x=cx-total/2,yy=y+li*13;
    line.forEach(p=>{
      ctx.fillStyle=p.it.color;ctx.fillRect(x,yy-box/2,box,box);
      ctx.strokeStyle='rgba(0,0,0,0.22)';ctx.lineWidth=0.6;ctx.strokeRect(x+0.5,yy-box/2+0.5,box-1,box-1);
      ctx.fillStyle='#42484F';ctx.fillText(p.it.label,x+box+gap,yy);
      x+=p.w;
    });
  });
  ctx.restore();ctx.textBaseline='alphabetic';
}

function drawDoublage(ctx,canvas){
  const W=canvas.width,Hc=canvas.height,sys=currentSysteme;
  const dp=!!(optState&&optState['double-peau']);
  const bandH=Math.min(94,Hc*0.40),totalW=Math.min(W-44,300);
  const x0=W/2-totalW/2,y0=Hc/2-bandH/2-2;
  const nPl=dp?2:1,wPl=13*nPl,wMur=totalW*0.20,wLame=totalW-wMur-wPl;
  ctx.fillStyle='#6B7480';ctx.fillRect(x0,y0,wMur,bandH);
  _hatch(ctx,x0,y0,wMur,bandH,'rgba(255,255,255,0.13)',7);
  const xL=x0+wMur;
  if(sys==='colle'){
    _wool(ctx,xL+13,y0,wLame-13,bandH);
    ctx.fillStyle='#B9B3A8';
    for(let i=0;i<4;i++){const py=y0+bandH*(i+0.5)/4-7;ctx.fillRect(xL,py,11,14);}
  }else{
    _wool(ctx,xL,y0,wLame,bandH);
    if(sys==='ossature'){_profilU(ctx,xL+wLame*0.5-8,y0+6,16,bandH-12);}
    else{ctx.fillStyle='#E8610A';[0.28,0.72].forEach(f=>{ctx.fillRect(xL,y0+bandH*f-3,9,6);});_profilU(ctx,xL+wLame-13,y0+6,11,bandH-12);}
  }
  const xP=xL+wLame;
  for(let i=0;i<nPl;i++)_plaque(ctx,xP+i*13,y0,13,bandH);
  ctx.strokeStyle='#8C8880';ctx.lineWidth=1.2;ctx.strokeRect(x0,y0,totalW,bandH);
  const sysName=OUVRAGES['doublage'].systemes.find(s=>s.id===sys).nom;
  ctx.fillStyle='#E8610A';ctx.font='700 12px Inter';ctx.textAlign='center';
  ctx.fillText(sysName,W/2,y0-10);
  const items=[{color:'#6B7480',label:'Mur'},{color:'#F2D98A',label:'Isolant'}];
  if(sys==='colle')items.push({color:'#B9B3A8',label:'Plots MAP'});
  else if(sys==='ossature')items.push({color:'#9AA6B2',label:'Ossature M48'});
  else items.push({color:'#E8610A',label:'Appuis'},{color:'#9AA6B2',label:'Fourrures'});
  items.push({color:'#EDEAE4',label:dp?'2x BA13':'BA13'});
  _legend(ctx,items,W/2,y0+bandH+16);
  ctx.fillStyle='#8A929B';ctx.font='600 10px Inter';ctx.textAlign='center';
  ctx.fillText(`${getDim('longueur')||'?'} x ${getDim('hauteur')||'?'} m`,W/2,Hc-7);
}

function drawCloison(ctx,canvas){
  const W=canvas.width,Hc=canvas.height,sys=currentSysteme;
  const dbl=(sys==='98-48'),sad=(sys==='sad'),md=!!(optState&&optState['montants-doubles']);
  const nPl=dbl?2:1;
  const bandH=Math.min(94,Hc*0.40),totalW=Math.min(W-44,300);
  const x0=W/2-totalW/2,y0=Hc/2-bandH/2-2;
  const wPl=13*nPl,wOss=totalW-2*wPl;
  let x=x0;
  for(let i=0;i<nPl;i++)_plaque(ctx,x+i*13,y0,13,bandH);x+=wPl;
  _wool(ctx,x,y0,wOss,bandH);
  if(sad){_profilU(ctx,x+wOss*0.30-8,y0+6,15,bandH-12);_profilU(ctx,x+wOss*0.70-8,y0+6,15,bandH-12);}
  else{const mw=(sys==='98-70')?20:16;
    if(md){_profilU(ctx,x+wOss*0.5-mw-1,y0+6,mw,bandH-12);_profilU(ctx,x+wOss*0.5+1,y0+6,mw,bandH-12);}
    else _profilU(ctx,x+wOss*0.5-mw/2,y0+6,mw,bandH-12);}
  x+=wOss;
  for(let i=0;i<nPl;i++)_plaque(ctx,x+i*13,y0,13,bandH);
  ctx.strokeStyle='#8C8880';ctx.lineWidth=1.2;ctx.strokeRect(x0,y0,totalW,bandH);
  const sysName=OUVRAGES['cloison'].systemes.find(s=>s.id===sys).nom;
  ctx.fillStyle='#E8610A';ctx.font='700 12px Inter';ctx.textAlign='center';
  ctx.fillText(sysName,W/2,y0-10);
  const items=[{color:'#EDEAE4',label:nPl>1?'2x BA13':'BA13'},{color:'#9AA6B2',label:sad?'Double ossature':((sys==='98-70')?'Montant 70':'Montant 48')},{color:'#F2D98A',label:'Isolant'}];
  _legend(ctx,items,W/2,y0+bandH+16);
  ctx.fillStyle='#8A929B';ctx.font='600 10px Inter';ctx.textAlign='center';
  ctx.fillText(`${getDim('longueur')||'?'} x ${getDim('hauteur')||'?'} m`,W/2,Hc-7);
}


function drawDalle(ctx,canvas){
  const W=canvas.width,Hc=canvas.height,sys=currentSysteme,mod=currentOuvrage;
  const totalW=Math.min(W-56,290),x0=W/2-totalW/2;
  let layers=[];
  if(mod==='dalle-beton'){
    layers=[{h:20,kind:'hatch',color:'#8A8175',label:'Hérisson / grave'},
            {h:5,kind:'film',color:'#5BA7C7',label:'Film polyane'},
            {h:16,kind:'wool',label:'Isolant'},
            {h:26,kind:'slab',color:'#AEB4BA',label:'Dalle béton + treillis'}];
  }else if(mod==='chape'){
    layers=[{h:30,kind:'hatch',color:'#8A8175',label:'Dalle support'}];
    if(sys==='flottante')layers.push({h:16,kind:'wool',label:'Isolant'});
    if(sys==='desolidarisee'||sys==='flottante')layers.push({h:5,kind:'film',color:'#5BA7C7',label:'Film polyane'});
    layers.push({h:(sys==='liquide')?14:20,kind:'screed',color:'#CFC8BC',label:(sys==='liquide')?'Chape fluide':'Chape'});
  }else{
    if(sys==='douche')layers=[{h:28,kind:'hatch',color:'#8A8175',label:'Support'},{h:7,kind:'band',color:'#7FB0A0',label:'SPEC étanchéité'},{h:9,kind:'comb',color:'#C9A98A',label:'Colle'},{h:12,kind:'tile',color:'#E7E2DA',label:'Carreau'}];
    else layers=[{h:30,kind:'hatch',color:'#8A8175',label:(sys==='mur')?'Mur support':'Support / chape'},{h:9,kind:'comb',color:'#C9A98A',label:'Colle peigne'},{h:12,kind:'tile',color:'#E7E2DA',label:'Carreau'}];
  }
  const sumH=layers.reduce((a,l)=>a+l.h,0);
  const k=Math.min(1.5,Math.min(150,Hc*0.55)/sumH);
  const totH=sumH*k,yBottom=Hc/2+totH/2-6,yTop=yBottom-totH;
  let y=yBottom;const items=[];
  layers.forEach(l=>{
    const hh=l.h*k,top=y-hh;
    if(l.kind==='hatch'){ctx.fillStyle=l.color;ctx.fillRect(x0,top,totalW,hh);_hatch(ctx,x0,top,totalW,hh,'rgba(255,255,255,0.14)',7);}
    else if(l.kind==='wool')_wool(ctx,x0,top,totalW,hh);
    else if(l.kind==='slab'){ctx.fillStyle=l.color;ctx.fillRect(x0,top,totalW,hh);ctx.fillStyle='#7D8389';for(let xx=x0+10;xx<x0+totalW-4;xx+=15){ctx.beginPath();ctx.arc(xx,top+hh*0.5,1.6,0,7);ctx.fill();}}
    else if(l.kind==='comb'){ctx.fillStyle=l.color;ctx.fillRect(x0,top,totalW,hh);ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=1;for(let xx=x0+4;xx<x0+totalW;xx+=6){ctx.beginPath();ctx.moveTo(xx,top+hh);ctx.lineTo(xx+3,top);ctx.stroke();}}
    else if(l.kind==='tile'){ctx.fillStyle=l.color;ctx.fillRect(x0,top,totalW,hh);ctx.strokeStyle='#B8B0A4';ctx.lineWidth=1;const step=Math.max(24,totalW/8);for(let xx=x0;xx<=x0+totalW;xx+=step){ctx.beginPath();ctx.moveTo(xx,top);ctx.lineTo(xx,top+hh);ctx.stroke();}}
    else{ctx.fillStyle=l.color;ctx.fillRect(x0,top,totalW,hh);}
    ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=0.5;ctx.strokeRect(x0,top,totalW,hh);
    items.unshift({color:(l.kind==='wool')?'#F2D98A':l.color,label:l.label});
    y=top;
  });
  ctx.strokeStyle='#6C6860';ctx.lineWidth=1.3;ctx.strokeRect(x0,yTop,totalW,totH);
  const sysName=OUVRAGES[mod].systemes.find(s=>s.id===sys).nom;
  ctx.fillStyle='#E8610A';ctx.font='700 12px Inter';ctx.textAlign='center';ctx.fillText(sysName,W/2,yTop-10);
  _legend(ctx,items,W/2,yBottom+14);
  ctx.fillStyle='#8A929B';ctx.font='600 10px Inter';ctx.textAlign='center';
  const dimTxt=(sys==='mur')?`${getDim('longueur')||'?'} x ${getDim('hauteur')||'?'} m`:`${getDim('longueur')||'?'} x ${getDim('largeur')||'?'} m`;
  ctx.fillText(dimTxt,W/2,Hc-6);
}

function drawPlafond(ctx,canvas){
  const W=canvas.width,Hc=canvas.height,sys=currentSysteme;
  const totalW=Math.min(W-44,300),x0=W/2-totalW/2;
  const dalleH=20,plenum=(sys==='tiges')?46:(sys==='longues-portees')?40:26,plaqH=12;
  const y0=Hc/2-(dalleH+plenum+plaqH)/2-2;
  const yPlaf=y0+dalleH+plenum;
  ctx.fillStyle='#6B7480';ctx.fillRect(x0,y0,totalW,dalleH);
  _hatch(ctx,x0,y0,totalW,dalleH,'rgba(255,255,255,0.13)',7);
  _plaque(ctx,x0,yPlaf,totalW,plaqH);
  const n=4;
  for(let i=0;i<n;i++){
    const sx=x0+totalW*(i+0.5)/n;
    if(sys==='longues-portees'){
      ctx.strokeStyle='#8A97A3';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(sx,yPlaf-2);ctx.lineTo(sx,yPlaf-plenum*0.5);ctx.stroke();
    }else{
      ctx.strokeStyle='#9AA6B2';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(sx,y0+dalleH);ctx.lineTo(sx,yPlaf);ctx.stroke();
      ctx.fillStyle='#E8610A';ctx.fillRect(sx-4,y0+dalleH,8,3);
      if(sys==='tiges'){ctx.fillStyle='#9AA6B2';ctx.fillRect(sx-1.5,y0+dalleH+plenum*0.32,3,7);}
    }
  }
  ctx.strokeStyle='#8A97A3';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x0+4,yPlaf-2);ctx.lineTo(x0+totalW-4,yPlaf-2);ctx.stroke();
  ctx.strokeStyle='#E8610A';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(x0-8,y0+dalleH);ctx.lineTo(x0-8,yPlaf);ctx.stroke();ctx.setLineDash([]);
  ctx.save();ctx.fillStyle='#E8610A';ctx.font='600 9px Inter';ctx.translate(x0-14,(y0+dalleH+yPlaf)/2);ctx.rotate(-Math.PI/2);ctx.textAlign='center';ctx.fillText('plénum',0,0);ctx.restore();
  const sysName=OUVRAGES['plafond'].systemes.find(s=>s.id===sys).nom;
  ctx.fillStyle='#E8610A';ctx.font='700 12px Inter';ctx.textAlign='center';
  ctx.fillText(sysName,W/2,y0-10);
  const items=[{color:'#6B7480',label:'Dalle / plancher'},{color:'#9AA6B2',label:sys==='longues-portees'?'Profilés porteurs':(sys==='tiges'?'Tiges filetées':'Suspentes')},{color:'#EDEAE4',label:'BA13'}];
  _legend(ctx,items,W/2,yPlaf+plaqH+15);
  ctx.fillStyle='#8A929B';ctx.font='600 10px Inter';ctx.textAlign='center';
  ctx.fillText(`${getDim('longueur')||'?'} x ${getDim('largeur')||'?'} m`,W/2,Hc-7);
}

function drawStructure(ctx, canvas) {
  const W = canvas.width, Hc = canvas.height;
  if (currentSysteme === 'poteau') {
    const H = getDim('hauteur') || 2.5;
    const h = Math.min(130, H * 38);
    const w = 38;
    const ox = W/2 - w/2, oy = Hc/2 + h/2 - 5;
    ctx.fillStyle = '#9AA3AC'; ctx.fillRect(ox, oy-h, w, h);
    ctx.strokeStyle = '#E8610A'; ctx.lineWidth = 1.5;
    [0.25, 0.5, 0.75].forEach(f => {
      ctx.beginPath(); ctx.moveTo(ox+w*f, oy); ctx.lineTo(ox+w*f, oy-h); ctx.stroke();
    });
    ctx.strokeStyle = '#C2562A'; ctx.lineWidth = 1;
    for (let y = oy-8; y > oy-h; y -= h/7) {
      ctx.beginPath(); ctx.moveTo(ox+4, y); ctx.lineTo(ox+w-4, y); ctx.stroke();
    }
    ctx.strokeStyle = '#3A4450'; ctx.lineWidth = 1.5; ctx.strokeRect(ox, oy-h, w, h);
    ctx.fillStyle = '#E8610A'; ctx.font = '600 11px Inter'; ctx.textAlign = 'center';
    ctx.fillText(`H = ${getDim('hauteur')||'?'} m`, ox+w/2, oy+18);
  } else {
    const L = getDim('longueur') || 4;
    const w = Math.min(300, L * 45);
    const h = currentSysteme === 'dalle-pleine' ? 26 : 44;
    const ox = W/2 - w/2, oy = Hc/2;
    ctx.fillStyle = '#9AA3AC'; ctx.fillRect(ox, oy-h/2, w, h);
    ctx.strokeStyle = '#E8610A'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(ox+4, oy+h/2-5); ctx.lineTo(ox+w-4, oy+h/2-5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox+4, oy-h/2+5); ctx.lineTo(ox+w-4, oy-h/2+5); ctx.stroke();
    if (currentSysteme !== 'dalle-pleine') {
      ctx.strokeStyle = '#C2562A'; ctx.lineWidth = 1;
      for (let x = ox+10; x < ox+w; x += w/10) {
        ctx.beginPath(); ctx.moveTo(x, oy-h/2+4); ctx.lineTo(x, oy+h/2-4); ctx.stroke();
      }
    }
    ctx.fillStyle = '#5C6670';
    ctx.fillRect(ox-12, oy-h/2, 12, h+18);
    ctx.fillRect(ox+w, oy-h/2, 12, h+18);
    ctx.strokeStyle = '#3A4450'; ctx.lineWidth = 1.5; ctx.strokeRect(ox, oy-h/2, w, h);
    ctx.fillStyle = '#E8610A'; ctx.font = '600 11px Inter'; ctx.textAlign = 'center';
    ctx.fillText(`Portée = ${getDim('longueur')||'?'} m`, ox+w/2, oy+h/2+28);
  }
  ctx.fillStyle = '#C8D0D8'; ctx.font = '600 9px Inter'; ctx.textAlign = 'center';
  ctx.fillText('⚠ SECTION INDICATIVE — VALIDATION BE', W/2, 16);
}

function drawPlancherBois(ctx, canvas) {
  const W = canvas.width, Hc = canvas.height;
  const L = getDim('longueur') || 4, lg = getDim('largeur') || 3;
  const entraxe = parseFloat(getDim('entraxe')) || 0.5;
  const w = Math.min(280, L * 40), d = Math.min(90, lg * 22);
  const ox = W/2 - w/2 - d*0.3, oy = Hc/2 + 30;

  const nbSol = Math.max(2, Math.min(12, Math.round(lg / entraxe)));
  for (let i = 0; i <= nbSol; i++) {
    const f = i / nbSol;
    ctx.strokeStyle = '#B5915E'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(ox + d*0.6*f, oy - d*0.4*f); ctx.lineTo(ox + w + d*0.6*f, oy - d*0.4*f); ctx.stroke();
  }
  ctx.strokeStyle = '#8A6D42'; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ox + d*0.6, oy - d*0.4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox+w, oy); ctx.lineTo(ox+w + d*0.6, oy - d*0.4); ctx.stroke();

  ctx.fillStyle = '#E8610A'; ctx.font = '600 11px Inter'; ctx.textAlign = 'center';
  ctx.fillText(`Portée ${getDim('longueur')||'?'} m · ${nbSol} solives`, ox+w/2+d*0.3, oy+24);
  ctx.fillStyle = '#C8D0D8'; ctx.font = '600 9px Inter';
  ctx.fillText('⚠ SECTION INDICATIVE — abaque habitation', W/2, 16);
}

function drawPiece(ctx, canvas) {
  const W = canvas.width, Hc = canvas.height;
  const L = getDim('longueur') || 4, lg = getDim('largeur') || 3, h = getDim('hauteur') || 2.5;
  const scale = Math.min(1, 9 / Math.max(L, lg));
  const w = Math.min(220, L * scale * 30), d = Math.min(90, lg * scale * 20);
  const ht = Math.min(90, h * 28);
  const ox = W/2 - w/2 - d*0.3, oy = Hc/2 + ht/2;

  ctx.fillStyle = '#E8E0D4';
  ctx.beginPath();
  ctx.moveTo(ox, oy); ctx.lineTo(ox+w, oy);
  ctx.lineTo(ox+w+d*0.6, oy-d*0.4); ctx.lineTo(ox+d*0.6, oy-d*0.4);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#D4CFC8';
  ctx.beginPath();
  ctx.moveTo(ox+d*0.6, oy-d*0.4); ctx.lineTo(ox+w+d*0.6, oy-d*0.4);
  ctx.lineTo(ox+w+d*0.6, oy-d*0.4-ht); ctx.lineTo(ox+d*0.6, oy-d*0.4-ht);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#C8C0B4';
  ctx.beginPath();
  ctx.moveTo(ox, oy); ctx.lineTo(ox+d*0.6, oy-d*0.4);
  ctx.lineTo(ox+d*0.6, oy-d*0.4-ht); ctx.lineTo(ox, oy-ht);
  ctx.closePath(); ctx.fill();

  ctx.fillStyle = '#E8610A';
  const rw = w*0.4, rh = ht*0.35;
  const rx = ox + d*0.6 + w*0.3, ry = oy-d*0.4 - rh - 6;
  ctx.fillRect(rx, ry, rw, rh);
  ctx.strokeStyle = '#FAFAF8'; ctx.lineWidth = 1;
  for (let i = 1; i < 5; i++) {
    ctx.beginPath(); ctx.moveTo(rx + rw*i/5, ry); ctx.lineTo(rx + rw*i/5, ry+rh); ctx.stroke();
  }
  ctx.strokeStyle = '#F5A623'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 3; i++) {
    const wy = ry - 6 - i*6;
    ctx.beginPath();
    ctx.moveTo(rx+rw*0.2, wy);
    ctx.quadraticCurveTo(rx+rw*0.35, wy-4, rx+rw*0.5, wy);
    ctx.quadraticCurveTo(rx+rw*0.65, wy+4, rx+rw*0.8, wy);
    ctx.stroke();
  }
  ctx.fillStyle = '#C8D0D8'; ctx.font = '600 11px Inter'; ctx.textAlign = 'center';
  const vol = (L*lg*h).toFixed(1);
  ctx.fillText(`${L} × ${lg} × ${h} m = ${vol} m³`, W/2, Hc-10);
}

function drawElec(ctx, canvas) {
  const W = canvas.width, Hc = canvas.height;
  ctx.font = '600 11px Inter'; ctx.textAlign = 'center';

  if (currentSysteme === 'tableau') {
    const tw = 200, th = 110;
    const ox = W/2 - tw/2, oy = Hc/2 - th/2;
    ctx.fillStyle = '#2C3640'; ctx.fillRect(ox, oy, tw, th);
    ctx.fillStyle = '#1A2229'; ctx.fillRect(ox+8, oy+8, tw-16, th-16);
    for (let r = 0; r < 3; r++) {
      const ry = oy + 16 + r * 30;
      ctx.fillStyle = '#E8E3DC'; ctx.fillRect(ox+16, ry, tw-32, 20);
      ctx.fillStyle = '#1A2229';
      for (let m = 1; m < 11; m++) ctx.fillRect(ox+16 + (tw-32)*m/11, ry, 1.5, 20);
      ctx.fillStyle = '#E8610A';
      for (let m = 0; m < 10; m++) ctx.fillRect(ox+18 + (tw-32)*m/11 + 4, ry+6, 6, 8);
    }
    ctx.strokeStyle = '#0F1419'; ctx.lineWidth = 2; ctx.strokeRect(ox, oy, tw, th);
    ctx.fillStyle = '#C8D0D8';
    ctx.fillText(`Tableau ${getDim('surface_totale')||'?'} m² · ${getDim('nb_pieces')||'?'} pièces`, W/2, oy+th+22);
  } else {
    const L = getDim('longueur') || 4, lg = getDim('largeur') || 3;
    const w = Math.min(240, L * 40), h = Math.min(120, lg * 35);
    const ox = W/2 - w/2, oy = Hc/2 - h/2;
    ctx.fillStyle = '#E8E0D4'; ctx.fillRect(ox, oy, w, h);
    ctx.strokeStyle = '#8C8880'; ctx.lineWidth = 1.5; ctx.strokeRect(ox, oy, w, h);
    ctx.fillStyle = '#1C2B3A';
    const prises = [[0.2,1],[0.5,1],[0.8,1],[0,0.5],[1,0.5],[0.5,0]];
    prises.forEach(([fx,fy]) => {
      const px = ox + w*fx, py = oy + h*fy;
      ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI*2); ctx.fill();
    });
    ctx.fillStyle = '#E8610A';
    ctx.beginPath(); ctx.arc(ox+w/2, oy+h/2, 8, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#FAFAF8'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(ox+w/2-5, oy+h/2-5); ctx.lineTo(ox+w/2+5, oy+h/2+5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox+w/2+5, oy+h/2-5); ctx.lineTo(ox+w/2-5, oy+h/2+5); ctx.stroke();
    ctx.fillStyle = '#C8D0D8'; ctx.font = '600 11px Inter';
    ctx.fillText(`${L} × ${lg} m = ${(L*lg).toFixed(1)} m²`, W/2, oy+h+22);
  }
}

function drawEscalier(ctx, canvas) {
  const W = canvas.width, Hc = canvas.height;
  const HM = (getDim('hauteur') || 2.7) * 100; // cm
  const hCible = parseFloat(getDim('hcible')) || 17;
  const n = Math.max(2, Math.round(HM / hCible));
  const h = HM / n;
  const nbMarches = n - 1;
  let g = 63 - 2 * h; g = Math.max(21, Math.min(34, g));
  const reculement = nbMarches * g;

  // Cadre de dessin
  const pad = 40;
  const availW = W - pad * 2, availH = Hc - pad * 2;
  const scale = Math.min(availW / Math.max(reculement, 1), availH / Math.max(HM, 1)) * 0.92;
  const totW = reculement * scale, totH = HM * scale;
  const ox = W/2 - totW/2;
  const oy = Hc/2 + totH/2;
  const gp = g * scale, hp = h * scale;

  // Profil en dents d'escalier
  ctx.strokeStyle = '#8C8880'; ctx.lineWidth = 1;
  ctx.fillStyle = '#C9A876';
  ctx.beginPath();
  ctx.moveTo(ox, oy);
  let cx = ox, cy = oy;
  for (let i = 0; i < nbMarches; i++) {
    cy -= hp; ctx.lineTo(cx, cy); // contremarche (montée)
    cx += gp; ctx.lineTo(cx, cy); // giron (avancée)
  }
  cy -= hp; ctx.lineTo(cx, cy); // dernière contremarche -> niveau étage
  // refermer le triangle plein (limon)
  ctx.lineTo(ox, oy);
  ctx.closePath();
  ctx.fillStyle = 'rgba(201,168,118,0.25)'; ctx.fill();
  ctx.strokeStyle = '#B5915E'; ctx.lineWidth = 1.5; ctx.stroke();

  // Marches surlignées (nez)
  ctx.strokeStyle = '#5C6670'; ctx.lineWidth = 2.5;
  cx = ox; cy = oy;
  for (let i = 0; i < nbMarches; i++) {
    cy -= hp;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + gp, cy); ctx.stroke();
    cx += gp;
  }

  // Ligne de foulée (pente)
  ctx.strokeStyle = '#E8610A'; ctx.lineWidth = 1.5; ctx.setLineDash([5,4]);
  ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ox + totW, oy - totH); ctx.stroke();
  ctx.setLineDash([]);

  // Cotes
  ctx.fillStyle = '#1C2B3A'; ctx.font = '600 10px Inter'; ctx.textAlign = 'center';
  // hauteur (verticale gauche)
  ctx.save(); ctx.translate(ox - 14, oy - totH/2); ctx.rotate(-Math.PI/2);
  ctx.fillText(`${(HM/100).toFixed(2)} m`, 0, 0); ctx.restore();
  // reculement (horizontale bas)
  ctx.fillText(`${(reculement/100).toFixed(2)} m`, ox + totW/2, oy + 16);

  // Récap
  ctx.fillStyle = '#E8610A'; ctx.font = '700 12px Inter';
  ctx.fillText(`${nbMarches} marches · h ${h.toFixed(1)} · g ${g.toFixed(1)} cm`, W/2, 18);
}

function drawMur(ctx,canvas){
  const W=canvas.width,Hc=canvas.height,sys=currentSysteme,mod=currentOuvrage;
  if(mod==='parpaing'){
    const epLabel={b20:'20 cm',b15:'15 cm',b10:'10 cm'}[sys]||'';
    const w=Math.min(W-60,300),h=Math.min(Hc*0.5,130);
    const x0=W/2-w/2,y0=Hc/2-h/2;
    ctx.fillStyle='#D9CDBB';ctx.fillRect(x0,y0,w,h);
    const rows=6,rh=h/rows,bw=w/5;
    ctx.strokeStyle='#A89C88';ctx.lineWidth=1;
    for(let r=0;r<rows;r++){
      const y=y0+r*rh;
      ctx.beginPath();ctx.moveTo(x0,y);ctx.lineTo(x0+w,y);ctx.stroke();
      const off=(r%2)*bw/2;
      for(let x=x0+off;x<x0+w+1;x+=bw){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,Math.min(y+rh,y0+h));ctx.stroke();}
    }
    ctx.strokeStyle='#6C6860';ctx.lineWidth=1.4;ctx.strokeRect(x0,y0,w,h);
    const sysName=OUVRAGES['parpaing'].systemes.find(s=>s.id===sys).nom;
    ctx.fillStyle='#E8610A';ctx.font='700 12px Inter';ctx.textAlign='center';ctx.fillText(sysName,W/2,y0-10);
    _legend(ctx,[{color:'#D9CDBB',label:'Blocs béton'},{color:'#A89C88',label:'Joints mortier 1 cm'},{color:'#E8610A',label:'Épaisseur '+epLabel}],W/2,y0+h+16);
    ctx.fillStyle='#8A929B';ctx.font='600 10px Inter';ctx.fillText(`${getDim('longueur')||'?'} x ${getDim('hauteur')||'?'} m`,W/2,Hc-6);
    return;
  }
  const bandH=Math.min(96,Hc*0.42),totalW=Math.min(W-44,300);
  const x0=W/2-totalW/2,y0=Hc/2-bandH/2-2,wSup=totalW*0.42;
  ctx.fillStyle='#8A8175';ctx.fillRect(x0,y0,wSup,bandH);_hatch(ctx,x0,y0,wSup,bandH,'rgba(255,255,255,0.14)',7);
  let x=x0+wSup;const items=[{color:'#8A8175',label:'Mur support'}];
  let coats;
  if(mod==='enduit'){
    if(sys==='traditionnel')coats=[{c:'#C9BBA0',l:'Gobetis'},{c:'#D8CDB6',l:'Corps'},{c:'#E7E0CF',l:'Finition'}];
    else if(sys==='chaux')coats=[{c:'#D8CDB6',l:'Chaux corps'},{c:'#ECE6D8',l:'Chaux finition'}];
    else coats=[{c:'#DCD2BE',l:'Monocouche'}];
  }else{
    coats=[{c:'#CFD6DA',l:'Primaire'}];
    const n=(sys==='finition-c')?1:2;
    for(let i=0;i<n;i++)coats.push({c:'#EDEAE4',l:'Peinture '+(i+1)});
  }
  const wCoat=(totalW-wSup)/coats.length;
  coats.forEach(co=>{ctx.fillStyle=co.c;ctx.fillRect(x,y0,wCoat,bandH);ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=0.5;ctx.strokeRect(x,y0,wCoat,bandH);x+=wCoat;items.push({color:co.c,label:co.l});});
  ctx.strokeStyle='#8C8880';ctx.lineWidth=1.2;ctx.strokeRect(x0,y0,totalW,bandH);
  const sysName=OUVRAGES[mod].systemes.find(s=>s.id===sys).nom;
  ctx.fillStyle='#E8610A';ctx.font='700 12px Inter';ctx.textAlign='center';ctx.fillText(sysName,W/2,y0-10);
  _legend(ctx,items,W/2,y0+bandH+16);
  ctx.fillStyle='#8A929B';ctx.font='600 10px Inter';ctx.fillText(`${getDim('longueur')||'?'} x ${getDim('hauteur')||'?'} m`,W/2,Hc-6);
}

// ════════════════════════════════════════════════════════════
// PROJETS + PLAN + AUTO-REMPLISSAGE
// ════════════════════════════════════════════════════════════
let projects = [];
let currentProjectId = null;
const LS_KEY = 'calepin_projects_v1';

function newProjectObj(nom){ return { id:'p'+Date.now()+Math.floor(Math.random()*1000), nom, rooms:[], walls:[], items:[], createdAt:Date.now() }; }
function esc(s){ return (''+(s==null?'':s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function currentProject(){ return projects.find(p => p.id === currentProjectId); }

function loadProjects(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const d = JSON.parse(raw); projects = d.projects || []; currentProjectId = d.current || null; }
  }catch(e){ projects = []; }
  if(!projects.length){ const p = newProjectObj('Mon projet'); projects.push(p); currentProjectId = p.id; saveProjects(); }
  if(!projects.find(p => p.id === currentProjectId)) currentProjectId = projects[0].id;
  // migration : positions de pièces + cloisons
  let mx = 0.25;
  projects.forEach(p => {
    if(!p.walls) p.walls = [];
    if(!p.items) p.items = [];
    p.walls.forEach(w=>{
      if(w.ep===undefined) w.ep=0.072;
      if(w.ax===undefined){ const ln=w.len||2, X=w.x||0, Y=w.y||0; w.ax=X; w.ay=Y; w.bx=(w.dir==='v')?X:X+ln; w.by=(w.dir==='v')?Y+ln:Y; delete w.dir; delete w.x; delete w.y; delete w.len; }
      if(w.roomId===undefined) w.roomId = roomAt(p, (w.ax+w.bx)/2, (w.ay+w.by)/2);
      if(!w.openings) w.openings=[];
    });
    (p.rooms || []).forEach(r => {
      if(r.x === undefined || r.y === undefined){ r.x = mx; r.y = 0.25; mx += (r.L || 3) + 0.5; }
      if(!r.openings) r.openings=[];
    });
  });
}
function saveProjects(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify({ projects, current: currentProjectId })); }catch(e){}
}

function createProject(){
  const nom = prompt('Nom du nouveau projet :', 'Projet ' + (projects.length + 1));
  if(!nom || !nom.trim()) return;
  const p = newProjectObj(nom.trim()); projects.push(p); currentProjectId = p.id;
  saveProjects(); renderProjectBar(); renderRooms();
}
function switchProject(id){ currentProjectId = id; saveProjects(); renderProjectBar(); renderRooms(); }
function renameProject(){
  const p = currentProject(); if(!p) return;
  const nom = prompt('Renommer le projet :', p.nom);
  if(nom && nom.trim()){ p.nom = nom.trim(); saveProjects(); renderProjectBar(); }
}
function deleteProject(){
  if(projects.length <= 1){ alert('Il faut conserver au moins un projet.'); return; }
  const p = currentProject();
  if(!confirm('Supprimer le projet « ' + p.nom + ' » et toutes ses pièces ?')) return;
  projects = projects.filter(x => x.id !== currentProjectId);
  currentProjectId = projects[0].id;
  saveProjects(); renderProjectBar(); renderRooms();
}

// ── Géométrie des pièces ──
function roomSurface(r){ return r.forme === 'L' ? Math.max(0, r.L*r.l - r.a*r.b) : r.L*r.l; }
function roomPerim(r){ return 2*(r.L + r.l); }
function roomVolume(r){ return roomSurface(r) * (r.h || 2.5); }

const PLAN_SCALE = 28, PLAN_MARGIN = 26, PLAN_SNAP = 0.25, PLAN_MAG = 0.35;
let planSel = null, planDrag = null, coteHotspots = [], resizeHandles = [], wallHandles = [], coteEdit = null;
let planZoom = 1, planOffX = 0, planOffY = 0;
function planSc(){ return PLAN_SCALE * planZoom; }
function m2px(v){ return PLAN_MARGIN + planOffX + v * planSc(); }
function px2m(px){ return (px - PLAN_MARGIN - planOffX) / planSc(); }
function zoomPlan(f){
  const cv = document.getElementById('plan-canvas'); if(!cv) return;
  const cxm = px2m(cv.width/2), cym = px2m(cv.height/2);
  planZoom = Math.max(0.4, Math.min(3, planZoom * f));
  planOffX = cv.width/2 - PLAN_MARGIN - cxm*planSc();
  planOffY = cv.height/2 - PLAN_MARGIN - cym*planSc();
  drawPlan();
}
function resetView(){ planZoom = 1; planOffX = 0; planOffY = 0; drawPlan(); }
function toggleSynthese(){ const el = document.getElementById('plan-rooms'); if(el) el.style.display = (el.style.display==='block')?'none':'block'; }

function _v(id){ const e = document.getElementById(id); return e ? e.value : ''; }

function placeNewRoom(p, room){
  if(!p.rooms.length){ room.x = 0.5; room.y = 0.5; return; }
  let maxR = 0, maxB = 0;
  p.rooms.forEach(r => { maxR = Math.max(maxR, r.x + r.L); maxB = Math.max(maxB, r.y + r.l); });
  const worldW = (360 - 2*PLAN_MARGIN) / PLAN_SCALE;
  if(maxR + 0.5 + room.L <= worldW){ room.x = maxR + 0.5; room.y = 0.5; }
  else { room.x = 0.5; room.y = maxB + 0.5; }
}
function dropRoom(forme){
  const p = currentProject(); if(!p) return;
  const base = forme === 'L'
    ? { forme:'L', L:5, l:4, a:2, b:1.5, h:2.5 }
    : { forme:'rect', L:4, l:3, a:0, b:0, h:2.5 };
  const room = Object.assign({ id:'r'+Date.now()+Math.floor(Math.random()*1000), nom:'Pièce '+(p.rooms.length+1), openings:[] }, base);
  placeNewRoom(p, room); p.rooms.push(room);
  planSel = { type:'room', id:room.id };
  saveProjects(); renderRooms();
}
function renameRoom(id){
  const r = currentProject().rooms.find(x=>x.id===id); if(!r) return;
  const v = prompt('Nom de la pièce :', r.nom); if(v && v.trim()){ r.nom = v.trim(); saveProjects(); renderRooms(); }
}
function editHeight(id){
  const r = currentProject().rooms.find(x=>x.id===id); if(!r) return;
  const v = parseFloat((prompt('Hauteur sous plafond (m) :', r.h)||'').replace(',','.'));
  if(v && v>0){ r.h = v; saveProjects(); renderRooms(); }
}
function openCoteInput(hs){
  const cv = document.getElementById('plan-canvas');
  const inp = document.getElementById('cote-input');
  if(hs.wallId){
    const w = currentProject().walls.find(x=>x.id===hs.wallId); if(!w) return;
    coteEdit = { wallId:hs.wallId }; inp.value = wallLen(w).toFixed(2);
  } else {
    const r = currentProject().rooms.find(x=>x.id===hs.roomId); if(!r) return;
    coteEdit = { roomId:hs.roomId, param:hs.param }; inp.value = r[hs.param];
  }
  inp.style.left = Math.max(2, Math.min(hs.x + hs.w/2 - 32, cv.width - 66)) + 'px';
  inp.style.top  = Math.max(2, hs.y - 6) + 'px';
  inp.style.display = 'block';
  setTimeout(()=>{ inp.focus(); inp.select(); }, 0);
}
function commitCote(){
  if(!coteEdit) return;
  const inp = document.getElementById('cote-input');
  const v = parseFloat((inp.value||'').replace(',','.'));
  const ce = coteEdit; coteEdit = null; inp.style.display = 'none';
  if(ce.wallId){
    const w = currentProject().walls.find(x=>x.id===ce.wallId);
    if(w && v>0){ const a=wallAngle(w); w.bx=w.ax+v*Math.cos(a); w.by=w.ay+v*Math.sin(a); saveProjects(); }
    renderRooms(); return;
  }
  const r = currentProject().rooms.find(x=>x.id===ce.roomId); const pm = ce.param;
  if(r && v>0){
    if(pm==='a' && v>=r.L){} else if(pm==='b' && v>=r.l){} else { r[pm]=v; saveProjects(); }
  }
  renderRooms();
}
function deleteRoom(id){
  const p = currentProject(); p.rooms = p.rooms.filter(r => r.id !== id);
  if(planSel && planSel.type==='room' && planSel.id===id) planSel = null;
  saveProjects(); renderRooms();
}

// ── Cloisons (segment A→B, angle libre, rattaché à une pièce) ──
function wallLen(w){ return Math.hypot(w.bx-w.ax, w.by-w.ay); }
function wallMid(w){ return { x:(w.ax+w.bx)/2, y:(w.ay+w.by)/2 }; }
function wallAngle(w){ return Math.atan2(w.by-w.ay, w.bx-w.ax); }
function roomAt(p, x, y){ for(let i=p.rooms.length-1;i>=0;i--){ const r=p.rooms[i]; if(x>=r.x&&x<=r.x+r.L&&y>=r.y&&y<=r.y+r.l) return r.id; } return null; }
// accroche un point aux coins de pièces / extrémités d'autres cloisons, sinon à la grille
function snapPoint(x, y, exclId){
  const p = currentProject(); let rx=x, ry=y, bx=PLAN_MAG, by=PLAN_MAG;
  const XS=[], YS=[];
  p.rooms.forEach(r=>{ XS.push(r.x, r.x+r.L); YS.push(r.y, r.y+r.l); });
  (p.walls||[]).forEach(w=>{ if(w.id===exclId) return; XS.push(w.ax, w.bx); YS.push(w.ay, w.by); });
  XS.forEach(v=>{ const d=Math.abs(v-x); if(d<bx){ bx=d; rx=v; } });
  YS.forEach(v=>{ const d=Math.abs(v-y); if(d<by){ by=d; ry=v; } });
  if(bx===PLAN_MAG) rx = Math.round(x/PLAN_SNAP)*PLAN_SNAP;
  if(by===PLAN_MAG) ry = Math.round(y/PLAN_SNAP)*PLAN_SNAP;
  return { x:Math.max(0,rx), y:Math.max(0,ry) };
}
// verrou angulaire : aligne l'extrémité sur un axe tous les 15° (comportement logiciel de plan)
function snapAngle(ax, ay, x, y){
  const d = Math.hypot(x-ax, y-ay); if(d<0.01) return { x, y };
  let ang = Math.atan2(y-ay, x-ax);
  const step = Math.PI/12, snapped = Math.round(ang/step)*step;
  if(Math.abs(ang-snapped) < 0.14) ang = snapped;
  return { x: ax + d*Math.cos(ang), y: ay + d*Math.sin(ang) };
}
function addWall(){
  const p = currentProject(); if(!p) return;
  const dir = (document.getElementById('wall-dir')||{}).value || 'h';
  const len = parseFloat((_v('wall-len')||'').replace(',','.')) || 2;
  let cx, cy, rid=null;
  const selRoom = planSel && planSel.type==='room' ? p.rooms.find(r=>r.id===planSel.id) : null;
  const base = selRoom || p.rooms[0];
  if(base){ cx = base.x + base.L/2; cy = base.y + base.l/2; rid = base.id; }
  else { cx = (360-2*PLAN_MARGIN)/PLAN_SCALE/2; cy = (290-2*PLAN_MARGIN)/PLAN_SCALE/2; }
  const w = { id:'w'+Date.now()+Math.floor(Math.random()*1000), roomId:rid, ep:0.072, openings:[],
    ax: dir==='h'? cx-len/2 : cx, ay: dir==='v'? cy-len/2 : cy,
    bx: dir==='h'? cx+len/2 : cx, by: dir==='v'? cy+len/2 : cy };
  p.walls.push(w); planSel = { type:'wall', id:w.id }; saveProjects(); renderRooms();
}
function deleteWall(id){
  const p = currentProject(); p.walls = p.walls.filter(w => w.id !== id);

function rotateWall(){
  if(!planSel || planSel.type!=='wall') return;
  const w = currentProject().walls.find(x=>x.id===planSel.id); if(!w) return;
  const m = wallMid(w), rot=(px,py)=>({ x:m.x-(py-m.y), y:m.y+(px-m.x) });
  const A=rot(w.ax,w.ay), B=rot(w.bx,w.by);
  w.ax=Math.max(0,Math.round(A.x/PLAN_SNAP)*PLAN_SNAP); w.ay=Math.max(0,Math.round(A.y/PLAN_SNAP)*PLAN_SNAP);
  w.bx=Math.max(0,Math.round(B.x/PLAN_SNAP)*PLAN_SNAP); w.by=Math.max(0,Math.round(B.y/PLAN_SNAP)*PLAN_SNAP);
  saveProjects(); drawPlan(); updateActions();
}

// ── Dessin du plan coté ──
function _cote(ctx, txt, x, y, align, param, roomId){
  ctx.fillStyle = param ? '#E8610A' : '#9AA0A6';
  ctx.font = (param?'700':'600') + ' 9px Inter'; ctx.textAlign = align;
  ctx.fillText(txt, x, y);
  if(param){
    const w = ctx.measureText(txt).width;
    let hx = align==='right' ? x-w : align==='left' ? x : x-w/2;
    coteHotspots.push({ x:hx-5, y:y-11, w:w+10, h:15, roomId, param });
  }
}
function drawPlan(){
  const cv = document.getElementById('plan-canvas'); if(!cv) return;
  const ctx = cv.getContext('2d'); const W = cv.width, H = cv.height;
  coteHotspots = []; resizeHandles = []; wallHandles = [];
  ctx.clearRect(0,0,W,H); ctx.fillStyle = '#FBFAF7'; ctx.fillRect(0,0,W,H);
  const mx = m2px, sc = planSc();
  ctx.strokeStyle = '#ECE6DA'; ctx.lineWidth = 1;
  const xMin=Math.floor(px2m(0)), xMax=Math.ceil(px2m(W)), yMin=Math.floor(px2m(0)), yMax=Math.ceil(px2m(H));
  for(let gx=xMin; gx<=xMax; gx++){ const px=mx(gx); ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,H); ctx.stroke(); }
  for(let gy=yMin; gy<=yMax; gy++){ const py=mx(gy); ctx.beginPath(); ctx.moveTo(0,py); ctx.lineTo(W,py); ctx.stroke(); }
  const p = currentProject();
  if(!p.rooms.length && (!p.walls||!p.walls.length)){
    ctx.fillStyle='#8A929B'; ctx.font='600 12px Inter'; ctx.textAlign='center';
    ctx.fillText('Dépose une forme, glisse-la, tire ses bords ou tape ses cotes', W/2, H/2); return;
  }
  p.rooms.forEach(r => {
    const sel = planSel && planSel.type==='room' && planSel.id===r.id;
    const ox=mx(r.x), oy=mx(r.y), rw=r.L*sc, rh=r.l*sc;
    ctx.fillStyle = sel?'rgba(232,97,10,0.22)':'rgba(232,97,10,0.10)';
    ctx.strokeStyle='#E8610A'; ctx.lineWidth = sel?2.4:1.6;
    if(r.forme==='L'){
      const aw=r.a*sc, bh=r.b*sc;
      ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(ox+rw,oy); ctx.lineTo(ox+rw,oy+rh-bh);
      ctx.lineTo(ox+rw-aw,oy+rh-bh); ctx.lineTo(ox+rw-aw,oy+rh); ctx.lineTo(ox,oy+rh); ctx.closePath();
    } else { ctx.beginPath(); ctx.rect(ox,oy,rw,rh); }
    ctx.fill(); ctx.stroke();
    ctx.fillStyle='#1C2B3A'; ctx.font='700 11px Inter'; ctx.textAlign='center';
    ctx.fillText(r.nom, ox+rw/2, oy+rh/2+3);
    _cote(ctx, r.L.toFixed(2), ox+rw/2, oy-4, 'center', 'L', r.id);
    _cote(ctx, r.l.toFixed(2), ox-4, oy+rh/2, 'right', 'l', r.id);
    if(r.forme==='L'){
      const aw=r.a*sc, bh=r.b*sc;
      _cote(ctx, (r.L-r.a).toFixed(2), ox+(rw-aw)/2, oy+rh+12, 'center', null, r.id);
      _cote(ctx, (r.l-r.b).toFixed(2), ox+rw+4, oy+(rh-bh)/2, 'left', null, r.id);
      _cote(ctx, r.a.toFixed(2), ox+rw-aw/2, oy+rh-bh-3, 'center', 'a', r.id);
      _cote(ctx, r.b.toFixed(2), ox+rw-aw+4, oy+rh-bh/2, 'left', 'b', r.id);
    } else {
      _cote(ctx, r.L.toFixed(2), ox+rw/2, oy+rh+12, 'center', null, r.id);
      _cote(ctx, r.l.toFixed(2), ox+rw+4, oy+rh/2, 'left', null, r.id);
    }
    if(sel){
      const hsz=13, hd=[[ox+rw,oy+rh/2,'e'],[ox+rw/2,oy+rh,'s'],[ox+rw,oy+rh,'se']];
      hd.forEach(([hx,hy,mode])=>{ ctx.fillStyle='#1C2B3A'; ctx.fillRect(hx-hsz/2,hy-hsz/2,hsz,hsz); ctx.fillStyle='#fff'; ctx.font='700 9px Inter'; ctx.textAlign='center'; ctx.fillText(mode==='s'?'↕':mode==='e'?'↔':'⤡',hx,hy+3); resizeHandles.push({x:hx-hsz,y:hy-hsz,w:hsz*2,h:hsz*2,id:r.id,mode}); });
    }
  });
  (p.walls||[]).forEach(w => {
    const sel = planSel && planSel.type==='wall' && planSel.id===w.id;
    const ax=mx(w.ax), ay=mx(w.ay), bx=mx(w.bx), by=mx(w.by), ep=Math.max(3,(w.ep||0.1)*sc);
    const ang=Math.atan2(by-ay, bx-ax), nx=Math.sin(ang)*ep/2, ny=-Math.cos(ang)*ep/2;
    ctx.fillStyle = sel?'#1C2B3A':'#5C6670';
    ctx.beginPath(); ctx.moveTo(ax+nx,ay+ny); ctx.lineTo(bx+nx,by+ny); ctx.lineTo(bx-nx,by-ny); ctx.lineTo(ax-nx,ay-ny); ctx.closePath(); ctx.fill();
    if(sel){ ctx.strokeStyle='#E8610A'; ctx.lineWidth=2; ctx.stroke(); }
    const len=wallLen(w), midx=(ax+bx)/2, midy=(ay+by)/2, lab=len.toFixed(2);
    const offx=Math.sin(ang)*(ep/2+9), offy=-Math.cos(ang)*(ep/2+9);
    ctx.fillStyle = sel?'#E8610A':'#5C6670'; ctx.font=(sel?'700':'600')+' 9px Inter'; ctx.textAlign='center';
    ctx.fillText(lab, midx+offx, midy+offy+3);
    if(sel){
      const tw=ctx.measureText(lab).width;
      coteHotspots.push({ x:midx+offx-tw/2-6, y:midy+offy-8, w:tw+12, h:16, wallId:w.id });
      [[ax,ay,'a'],[bx,by,'b']].forEach(([hx,hy,end])=>{
        ctx.fillStyle='#E8610A'; ctx.beginPath(); ctx.arc(hx,hy,7,0,2*Math.PI); ctx.fill();
        ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(hx,hy,3,0,2*Math.PI); ctx.fill();
        wallHandles.push({ x:hx-13, y:hy-13, w:26, h:26, id:w.id, end });
      });
    }
  });
  drawOpenings(ctx, mx, sc);
}
function drawOpenings(ctx, mx, sc){
  const p=currentProject();
  (p.walls||[]).forEach(w=>{
    const ops=w.openings||[]; if(!ops.length) return;
    const ang=Math.atan2(w.by-w.ay, w.bx-w.ax), L=wallLen(w), ux=Math.cos(ang), uy=Math.sin(ang), epx=(w.ep||0.1)*sc;
    ops.forEach((o,i)=>{
      const k=(i+1)/(ops.length+1), cx=w.ax+(w.bx-w.ax)*k, cy=w.ay+(w.by-w.ay)*k, half=Math.min(o.larg,L*0.9)/2;
      ctx.strokeStyle=o.type==='porte'?'#C8902B':'#2F77B5'; ctx.lineWidth=Math.max(4,epx+2);
      ctx.beginPath(); ctx.moveTo(mx(cx-ux*half),mx(cy-uy*half)); ctx.lineTo(mx(cx+ux*half),mx(cy+uy*half)); ctx.stroke();
      ctx.fillStyle=o.type==='porte'?'#C8902B':'#2F77B5'; ctx.font='700 8px Inter'; ctx.textAlign='center';
      ctx.fillText(o.type==='porte'?'P':'F', mx(cx)+Math.sin(ang)*(epx/2+8), mx(cy)-Math.cos(ang)*(epx/2+8)+3);
    });
  });
  p.rooms.forEach(r=>{
    const ops=r.openings||[]; if(!ops.length) return; const y=mx(r.y);
    ops.forEach((o,i)=>{
      const k=(i+1)/(ops.length+1), cx=r.x+r.L*k, half=Math.min(o.larg,r.L*0.45)/2;
      ctx.strokeStyle=o.type==='porte'?'#C8902B':'#2F77B5'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.moveTo(mx(cx-half),y); ctx.lineTo(mx(cx+half),y); ctx.stroke();
      ctx.fillStyle=o.type==='porte'?'#C8902B':'#2F77B5'; ctx.font='700 8px Inter'; ctx.textAlign='center';
      ctx.fillText(o.type==='porte'?'P':'F', mx(cx), y-4);
    });
  });
}
function planPx(e){
  const cv = document.getElementById('plan-canvas'); const rect = cv.getBoundingClientRect();
  return { px:(e.clientX-rect.left)*(cv.width/rect.width), py:(e.clientY-rect.top)*(cv.height/rect.height) };
}
function planM(e){ const q = planPx(e); return { x:px2m(q.px), y:px2m(q.py) }; }
function distSeg(px,py,x1,y1,x2,y2){
  const dx=x2-x1, dy=y2-y1, l2=dx*dx+dy*dy||1; let tt=((px-x1)*dx+(py-y1)*dy)/l2; tt=Math.max(0,Math.min(1,tt));
  return Math.hypot(px-(x1+tt*dx), py-(y1+tt*dy));
}
function planHit(mxp,myp){
  const p = currentProject(); const walls = p.walls||[];
  for(let i=walls.length-1;i>=0;i--){ const w=walls[i];
    if(distSeg(mxp,myp,w.ax,w.ay,w.bx,w.by) < Math.max(0.3,(w.ep||0.1)/2+0.12)) return { type:'wall', id:w.id };
  }
  for(let i=p.rooms.length-1;i>=0;i--){ const r=p.rooms[i];
    if(mxp>=r.x && mxp<=r.x+r.L && myp>=r.y && myp<=r.y+r.l) return { type:'room', id:r.id };
  }
  return null;
}
function snapMag(obj){
  const p = currentProject(); const xs=[], ys=[];
  p.rooms.forEach(o=>{ if(o.id!==obj.id){ xs.push(o.x,o.x+o.L); ys.push(o.y,o.y+o.l); } });
  (p.walls||[]).forEach(w=>{ xs.push(w.ax,w.bx); ys.push(w.ay,w.by); });
  const edgesX = [obj.x, obj.x+obj.L], edgesY = [obj.y, obj.y+obj.l];
  let best=PLAN_MAG, dx=0; edgesX.forEach(ex=>xs.forEach(X=>{ const d=X-ex; if(Math.abs(d)<best){best=Math.abs(d);dx=d;} }));
  best=PLAN_MAG; let dy=0; edgesY.forEach(ey=>ys.forEach(Y=>{ const d=Y-ey; if(Math.abs(d)<best){best=Math.abs(d);dy=d;} }));
  obj.x+=dx; obj.y+=dy;
}
function planDown(e){
  e.preventDefault();
  const q = planPx(e);
  for(const hs of coteHotspots){ if(q.px>=hs.x && q.px<=hs.x+hs.w && q.py>=hs.y && q.py<=hs.y+hs.h){ openCoteInput(hs); return; } }
  for(const h of wallHandles){ if(q.px>=h.x && q.px<=h.x+h.w && q.py>=h.y && q.py<=h.y+h.h){ planDrag = { type:'wallend', id:h.id, end:h.end, moved:false }; return; } }
  for(const h of resizeHandles){ if(q.px>=h.x && q.px<=h.x+h.w && q.py>=h.y && q.py<=h.y+h.h){ planDrag = { type:'resize', id:h.id, mode:h.mode, moved:false }; return; } }
  const m = planM(e); const hit = planHit(m.x, m.y); planSel = hit;
  const p = currentProject();
  if(hit && hit.type==='room'){
    const r = p.rooms.find(x=>x.id===hit.id);
    planDrag = { type:'room', id:hit.id, ox:m.x-r.x, oy:m.y-r.y, px:r.x, py:r.y, moved:false };
  } else if(hit && hit.type==='wall'){
    const w = p.walls.find(x=>x.id===hit.id);
    planDrag = { type:'wall', id:hit.id, ox:m.x-w.ax, oy:m.y-w.ay, moved:false };
  } else {
    planDrag = { type:'pan', sx:q.px, sy:q.py, ox0:planOffX, oy0:planOffY, moved:false };
  }
  drawPlan(); updateActions();
}
function planMove(e){
  if(!planDrag) return; e.preventDefault();
  if(planDrag.type==='pan'){ const q=planPx(e); planOffX=planDrag.ox0+(q.px-planDrag.sx); planOffY=planDrag.oy0+(q.py-planDrag.sy); drawPlan(); return; }
  const m = planM(e); const p = currentProject();
  if(planDrag.type==='resize'){
    const r = p.rooms.find(x=>x.id===planDrag.id); if(!r) return;
    if(planDrag.mode==='e'||planDrag.mode==='se') r.L = Math.max(0.5, Math.round((m.x - r.x)/PLAN_SNAP)*PLAN_SNAP);
    if(planDrag.mode==='s'||planDrag.mode==='se') r.l = Math.max(0.5, Math.round((m.y - r.y)/PLAN_SNAP)*PLAN_SNAP);
    if(r.forme==='L'){ if(r.a>=r.L) r.a=Math.max(0.25, r.L-0.25); if(r.b>=r.l) r.b=Math.max(0.25, r.l-0.25); }
    planDrag.moved=true; drawPlan(); return;
  }
  if(planDrag.type==='wallend'){
    const w = p.walls.find(x=>x.id===planDrag.id); if(!w) return;
    const fixed = planDrag.end==='a' ? {x:w.bx,y:w.by} : {x:w.ax,y:w.ay};
    let pt = snapPoint(m.x, m.y, w.id);
    pt = snapAngle(fixed.x, fixed.y, pt.x, pt.y);
    if(planDrag.end==='a'){ w.ax=pt.x; w.ay=pt.y; } else { w.bx=pt.x; w.by=pt.y; }
    planDrag.moved=true; drawPlan(); return;
  }
  if(planDrag.type==='wall'){
    const w = p.walls.find(x=>x.id===planDrag.id); if(!w) return;
    const len=wallLen(w), ang=wallAngle(w), na=snapPoint(m.x-planDrag.ox, m.y-planDrag.oy, w.id);
    w.ax=na.x; w.ay=na.y; w.bx=na.x+len*Math.cos(ang); w.by=na.y+len*Math.sin(ang);
    w.roomId = roomAt(p, (w.ax+w.bx)/2, (w.ay+w.by)/2);
    planDrag.moved=true; drawPlan(); return;
  }
  const r = p.rooms.find(x=>x.id===planDrag.id); if(!r) return;
  r.x = Math.max(0, Math.round((m.x-planDrag.ox)/PLAN_SNAP)*PLAN_SNAP);
  r.y = Math.max(0, Math.round((m.y-planDrag.oy)/PLAN_SNAP)*PLAN_SNAP);
  snapMag(r);
  const dx=r.x-planDrag.px, dy=r.y-planDrag.py;
  if(dx||dy){ (p.walls||[]).forEach(w=>{ if(w.roomId===r.id){ w.ax+=dx; w.ay+=dy; w.bx+=dx; w.by+=dy; } }); }
  planDrag.px=r.x; planDrag.py=r.y; planDrag.moved=true; drawPlan();
}
function planUp(){ if(planDrag){ if(planDrag.moved){ saveProjects(); renderRooms(); } planDrag=null; } }
function initPlanInteract(){
  const cv = document.getElementById('plan-canvas'); if(!cv || cv._init) return; cv._init = true;
  cv.style.touchAction = 'none';
  cv.addEventListener('pointerdown', planDown);
  cv.addEventListener('pointermove', planMove);
  window.addEventListener('pointerup', planUp);
  window.addEventListener('resize', ()=>{ const m=document.getElementById('plan-modal'); if(m && m.style.display==='flex') sizePlanCanvas(); });
  const inp = document.getElementById('cote-input');
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); inp.blur(); } });
  inp.addEventListener('blur', commitCote);
}
function sizePlanCanvas(){
  const cv=document.getElementById('plan-canvas'), wrap=document.getElementById('plan-canvas-wrap');
  if(!cv||!wrap) return;
  const w=wrap.clientWidth, h=wrap.clientHeight;
  if(w>0&&h>0){ cv.width=w; cv.height=h; }
  drawPlan();
}

// ── Portes & fenêtres (ouvertures) ──
const OUV_DEF = { porte: {larg:0.83, haut:2.04}, fenetre: {larg:1.20, haut:1.15} };
function ouvHost(hostType, hostId){
  const p=currentProject();
  const host = hostType==='wall' ? (p.walls||[]).find(w=>w.id===hostId) : p.rooms.find(r=>r.id===hostId);
  if(host && !host.openings) host.openings=[];
  return host;
}
function addOpening(hostType, hostId, type){
  const h=ouvHost(hostType,hostId); if(!h) return;
  const d=OUV_DEF[type]||OUV_DEF.porte;
  h.openings.push({ id:'o'+Date.now()+Math.floor(Math.random()*1000), type, larg:d.larg, haut:d.haut });
  saveProjects(); renderRooms();
}
function setOpening(hostType, hostId, oid, field, v){
  const h=ouvHost(hostType,hostId); if(!h) return;
  const o=h.openings.find(x=>x.id===oid), n=parseFloat((''+v).replace(',','.'));
  if(o && n>0){ o[field]=n; saveProjects(); renderRooms(); }
}
function deleteOpening(hostType, hostId, oid){
  const h=ouvHost(hostType,hostId); if(!h) return;
  h.openings=h.openings.filter(x=>x.id!==oid); saveProjects(); renderRooms();
}
function openingsToDeductions(openings){
  return (openings||[]).map(o=>{ deductId++; return { id:deductId, larg:o.larg, haut:o.haut }; });
}
function openingsHtml(hostType, hostId, openings){
  const rows = (openings||[]).map(o=>`
      <div class="ouv-row">
        <span class="ouv-ic">${o.type==='porte'?'🚪':'🪟'}</span>
        <input type="number" step="0.01" min="0" value="${o.larg}" onchange="setOpening('${hostType}','${hostId}','${o.id}','larg',this.value)"> ×
        <input type="number" step="0.01" min="0" value="${o.haut}" onchange="setOpening('${hostType}','${hostId}','${o.id}','haut',this.value)"> m
        <button class="ouv-del" onclick="deleteOpening('${hostType}','${hostId}','${o.id}')">✕</button>
      </div>`).join('');
  return `<div class="ouv-box">
        <div class="ouv-head">Ouvertures
          <button class="ouv-add" onclick="addOpening('${hostType}','${hostId}','porte')">+ Porte</button>
          <button class="ouv-add" onclick="addOpening('${hostType}','${hostId}','fenetre')">+ Fenêtre</button>
        </div>${rows}</div>`;
}
function autofillFromWall(wallId){
  const p=currentProject(); const w=(p.walls||[]).find(x=>x.id===wallId); if(!w) return;
  const r = w.roomId ? p.rooms.find(x=>x.id===w.roomId) : null;
  const h = (r && r.h) ? r.h : 2.5;
  closePlan(); selectOuvrage('cloison');
  const setDim=(id,v)=>{ const e=document.getElementById('dim-'+id); if(e) e.value=Math.round(v*100)/100; };
  setDim('longueur', wallLen(w)); setDim('hauteur', h);
  deductions = openingsToDeductions(w.openings);
  const hasPorte=(w.openings||[]).some(o=>o.type==='porte');
  const tg=document.getElementById('opt-porte'); if(tg){ if(hasPorte) tg.classList.add('on'); else tg.classList.remove('on'); }
  renderDeductions(); calculer();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  toast('Débits générés pour la cloison ('+wallLen(w).toFixed(2)+' m)');
}
function autofillFromRoom(roomId){
  const r = currentProject().rooms.find(x => x.id === roomId); if(!r) return;
  const target = document.getElementById('af-' + roomId).value;
  const SOL = ['carrelage','chape','dalle-beton','plafond'];
  const MUR = ['doublage','cloison','peinture','enduit'];
  const perim = roomPerim(r), h = r.h || 2.5;
  closePlan(); selectOuvrage(target);
  if(target === 'electricite') selectSysteme('piece-seche');
  else if(target === 'carrelage') selectSysteme('sol');
  const setDim = (id,v) => { const e = document.getElementById('dim-' + id); if(e) e.value = Math.round(v*100)/100; };
  deductions = [];
  if(SOL.includes(target)){ setDim('longueur', r.L); setDim('largeur', r.l); if(r.forme === 'L'){ deductId++; deductions = [{ id: deductId, larg: r.a, haut: r.b }]; } }
  else if(MUR.includes(target)){ setDim('longueur', perim); setDim('hauteur', h); deductions = openingsToDeductions(r.openings); }
  else if(target === 'chauffage'){ setDim('longueur', r.L); setDim('largeur', r.l); setDim('hauteur', h); }
  else if(target === 'electricite'){ setDim('longueur', r.L); setDim('largeur', r.l); }
  renderDeductions(); calculer();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  toast('Dimensions importées depuis « ' + r.nom + ' »');
}

function openPlan(){ initPlanInteract(); document.getElementById('plan-modal').style.display='flex'; requestAnimationFrame(()=>{ sizePlanCanvas(); renderRooms(); }); }
function closePlan(){ const m = document.getElementById('plan-modal'); if(m) m.style.display = 'none'; }

function renderProjectBar(){
  const sel = document.getElementById('project-select');
  if(!sel) return;
  sel.innerHTML = projects.map(p => `<option value="${p.id}" ${p.id===currentProjectId?'selected':''}>${esc(p.nom)}</option>`).join('');
}

// LISTE DE COURSES (consolidation projet)
// ════════════════════════════════════════════════════════════
function addCurrentToProject(){
  if(!lastMats || !lastMats.length){ alert('Calcule d\'abord un ouvrage.'); return; }
  const p = currentProject(); if(!p) return;
  if(!p.items) p.items = [];
  const cfg = OUVRAGES[currentOuvrage];
  const sysNom = (cfg.systemes.find(s=>s.id===currentSysteme)||{}).nom || '';
  const lignes = lastMats.map((m,i)=>{
    const puEl = document.getElementById('pu-'+i);
    const pu = puEl ? (parseFloat(puEl.value)||0) : (lastPrices[i]||0);
    return { nom:m.nom, qte:m.qte, unite:m.unite, pu };
  });
  const total = lignes.reduce((a,l)=>a + l.qte*l.pu, 0);
  p.items.push({ id:'it'+Date.now()+Math.floor(Math.random()*1000), ouvrage:cfg.label, systeme:sysNom, lignes, total });
  saveProjects();
  const btn = document.getElementById('add-proj-btn');
  if(btn){ const o = btn.textContent; btn.textContent = '✓ Ajouté au projet « '+p.nom+' »'; btn.disabled = true; setTimeout(()=>{ btn.textContent=o; btn.disabled=false; }, 1800); }
}
function aggregateItems(p){
  const map = new Map(); let total = 0;
  (p.items||[]).forEach(it => (it.lignes||[]).forEach(l => {
    const key = l.nom+'|'+l.unite;
    const cur = map.get(key) || { nom:l.nom, unite:l.unite, qte:0, cout:0, pu:l.pu||0 };
    cur.qte += l.qte; cur.cout += l.qte*(l.pu||0); if(l.pu) cur.pu = l.pu;
    map.set(key, cur); total += l.qte*(l.pu||0);
  }));
  return { lignes:[...map.values()], total };
}
function deleteItem(id){ const p = currentProject(); p.items = (p.items||[]).filter(i=>i.id!==id); saveProjects(); renderCourses(); }
function openCourses(){ renderCourses(); document.getElementById('courses-modal').style.display = 'flex'; }
function closeCourses(){ const m = document.getElementById('courses-modal'); if(m) m.style.display = 'none'; }
function renderCourses(){
  const p = currentProject(); if(!p) return;
  document.getElementById('courses-project').textContent = p.nom;
  const agg = aggregateItems(p);
  let html = '';
  if(!p.items || !p.items.length){
    html = '<div class="plan-empty">Aucun ouvrage ajouté.<br>Calcule un ouvrage, puis appuie sur « Ajouter au projet ».</div>';
  } else {
    html += '<div class="cs-sec">Ouvrages du projet (' + p.items.length + ')</div>';
    html += p.items.map(it => `
      <div class="cs-ouvrage">
        <div><div class="cs-ouv-nom">${esc(it.ouvrage)}${it.systeme?' — '+esc(it.systeme):''}</div><div class="cs-ouv-sub">${it.total.toFixed(2)} € HT · ${it.lignes.length} matériaux</div></div>
        <button class="room-ic del" onclick="deleteItem('${it.id}')">✕</button>
      </div>`).join('');
    html += '<div class="cs-sec">Liste de courses consolidée</div>';
    html += agg.lignes.map(l => `
      <div class="cs-line">
        <span class="cs-nom">${esc(l.nom)}</span>
        <span class="cs-qte">${Math.round(l.qte*100)/100} ${l.unite}</span>
        <span class="cs-cout">${l.cout?l.cout.toFixed(2)+' €':'—'}</span>
      </div>`).join('');
  }
  document.getElementById('courses-list').innerHTML = html;
  document.getElementById('courses-total').textContent = agg.total.toFixed(2) + ' € HT';
}
